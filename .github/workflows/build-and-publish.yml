name: Build and Publish Plugins

on:
  push:
    branches: [main]
    paths:
      - "*/src/**"
      - "*/package.json"
  workflow_dispatch:
    inputs:
      build_all:
        description: "Build all plugins (ignore diff)"
        type: boolean
        default: false
      plugin:
        description: "Build a specific plugin only (e.g. calc-paper)"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.detect.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed plugins
        id: detect
        run: |
          EXCLUDE='^(scripts|marketplace|\.github|README|package\.json|pnpm|\.|ctool|excalidraw)'
          if [ -n "${{ inputs.plugin }}" ]; then
            PLUGINS=$(echo '${{ inputs.plugin }}' | jq -Rc . | jq -sc .)
          elif [ "${{ inputs.build_all }}" == "true" ]; then
            PLUGINS=$(ls -d */ | sed 's|/||' | grep -vE "$EXCLUDE" | jq -Rc . | jq -sc .)
          else
            PLUGINS=$(git diff --name-only HEAD^ HEAD | cut -d'/' -f1 | sort -u | grep -vE "$EXCLUDE" | jq -Rc . | jq -sc .)
          fi
          echo "plugins=$PLUGINS" >> $GITHUB_OUTPUT
          echo "Will build: $PLUGINS"

  build:
    needs: detect
    if: needs.detect.outputs.plugins != '[]' && needs.detect.outputs.plugins != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build ${{ matrix.plugin }}
        run: |
          cd ${{ matrix.plugin }}
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Package ${{ matrix.plugin }}
        run: |
          cd ${{ matrix.plugin }}
          node scripts/package.js

      - name: Upload to COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          pnpm install --no-frozen-lockfile
          node scripts/upload-to-cos.cjs ${{ matrix.plugin }}

  update-marketplace:
    needs: [detect, build]
    if: always() && needs.detect.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root deps
        run: pnpm install

      - name: Update marketplace
        env:
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: node scripts/update-marketplace.js

      - name: Sync plugins to Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: node scripts/sync-plugins-to-gist.cjs

      - name: Commit marketplace changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add marketplace/plugins.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update marketplace after build [skip ci]"
            git pull --rebase origin main
            git push
          fi
